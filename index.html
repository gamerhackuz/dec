<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanlov G'ildiragi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; }
        .container { background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 100%; max-width: 450px; text-align: center; }
        h2 { margin-bottom: 20px; color: #f59e0b; }
        .wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 0 auto 20px; }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(#ef4444 0% 20%, #f59e0b 20% 40%, #10b981 40% 60%, #3b82f6 60% 80%, #8b5cf6 80% 100%);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #f59e0b; z-index: 10;
        }
        .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #0f172a; border-radius: 50%; z-index: 5; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .spin-btn { background: #f59e0b; color: #0f172a; }
        .add-btn { background: #334155; color: white; }
        .result { font-size: 20px; min-height: 30px; color: #10b981; font-weight: bold; }
        .items { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .item { background: #334155; padding: 4px 10px; border-radius: 12px; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .item span { cursor: pointer; color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎡 Tanlov G'ildiragi</h2>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="center"></div>
        </div>
        <div class="result" id="result">Natija shu yerda...</div>
        <div class="controls">
            <input type="text" id="newItem" placeholder="Variant qo'shing...">
            <button class="add-btn" onclick="addItem()">➕</button>
        </div>
        <div class="items" id="itemsList"></div>
        <button class="spin-btn" style="width:100%; padding:12px;" onclick="spin()" id="spinBtn">🔄 Aylantirish</button>
    </div>

    <script>
        let items = ['Pizza', 'Sushi', 'Osh', 'Manti', 'Burger'];
        let currentRotation = 0;
        const colors = ['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316'];

        function renderItems() {
            const list = document.getElementById('itemsList');
            list.innerHTML = items.map((item, i) => `
                <div class="item" style="border-left: 3px solid ${colors[i % colors.length]}">
                    ${item} <span onclick="removeItem(${i})">✕</span>
                </div>
            `).join('');
            updateWheel();
        }

        function updateWheel() {
            const wheel = document.getElementById('wheel');
            const gradient = items.map((_, i) => `${colors[i % colors.length]} ${(i/items.length)*100}% ${((i+1)/items.length)*100}%`).join(', ');
            wheel.style.background = `conic-gradient(${gradient})`;
        }

        function addItem() {
            const input = document.getElementById('newItem');
            if (input.value.trim() && items.length < 12) {
                items.push(input.value.trim());
                input.value = '';
                renderItems();
            }
        }

        function removeItem(i) {
            if (items.length > 2) {
                items.splice(i, 1);
                renderItems();
            }
        }

        function spin() {
            if (items.length < 2) return alert("Kamida 2 ta variant bo'lishi kerak!");
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('result').textContent = "Aylanmoqda...";
            
            const extraSpins = 5 + Math.floor(Math.random() * 3);
            const randomAngle = Math.floor(Math.random() * 360);
            currentRotation += (extraSpins * 360) + randomAngle;
            
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualAngle = currentRotation % 360;
                const sliceSize = 360 / items.length;
                const index = Math.floor((360 - actualAngle) / sliceSize) % items.length;
                document.getElementById('result').textContent = `🎉 ${items[index]} tanlandi!`;
                btn.disabled = false;
            }, 4100);
        }

        document.getElementById('newItem').addEventListener('keypress', e => { if(e.key==='Enter') addItem(); });
        renderItems();
    </script>
</body>
</html>
